<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E0A8"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#8B6B3D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a08"/>

  <!-- Outer chamfered square -->
  <polygon
    points="50,20 350,20 380,50 380,350 350,380 50,380 20,350 20,50"
    fill="none"
    stroke="#E8C98A"
    stroke-width="1.8"
    stroke-opacity="0.5"
  />

  <!-- Corner bracket TL -->
  <polyline points="90,20 50,20 20,50 20,90" fill="none" stroke="#E8C98A" stroke-width="4"/>

  <!-- Corner bracket TR -->
  <polyline points="312,20 350,20 380,50 380,90" fill="none" stroke="#E8C98A" stroke-width="4"/>

  <!-- Corner bracket BR -->
  <polyline points="380,310 380,350 350,380 310,380" fill="none" stroke="#E8C98A" stroke-width="4"/>

  <!-- Corner bracket BL -->
  <polyline points="90,380 50,380 20,350 20,310" fill="none" stroke="#E8C98A" stroke-width="4"/>

  <!-- AP monogram -->
  <text
    x="200"
    y="258"
    font-family="Playfair Display, Georgia, serif"
    font-size="200"
    text-anchor="middle"
    letter-spacing="-10"
    fill="url(#g5)"
  ><tspan font-weight="700">A</tspan><tspan font-weight="400">P</tspan></text>

</svg>
